<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GraviVPN CS Mini-Proto</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; cursor: crosshair; }
        #ui {
            position: absolute; bottom: 20px; left: 20px;
            color: #00ff00; font-size: 24px; text-shadow: 2px 2px #000;
            pointer-events: none;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            border-left: 2px solid #0f0; border-right: 2px solid #0f0;
            margin-left: -10px; margin-top: -1px;
            pointer-events: none;
        }
        #crosshair::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            border-top: 2px solid #0f0; border-bottom: 2px solid #0f0;
            margin-left: -1px; margin-top: -10px;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">HP: 100 | ARMOR: 100 | AMMO: 30/90</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Состояние игрока
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            bullets: []
        };

        // Эффект выстрела
        function shoot() {
            player.bullets.push({
                x: canvas.width / 2,
                y: canvas.height / 2,
                timer: 5
            });
            console.log("Pew! GraviVPN Protection Active");
        }

        // Рисование «карты» (имитация 3D через 2D)
        function draw() {
            ctx.fillStyle = "#1a1a1a"; // Пол
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Стены (простая перспектива)
            ctx.strokeStyle = "#333";
            ctx.beginPath();
            ctx.moveTo(0, 0); ctx.lineTo(canvas.width, canvas.height);
            ctx.moveTo(canvas.width, 0); ctx.lineTo(0, canvas.height);
            ctx.stroke();

            // Отрисовка пуль/вспышек
            ctx.fillStyle = "orange";
            player.bullets.forEach((b, i) => {
                ctx.beginPath();
                ctx.arc(b.x + (Math.random()*10-5), b.y + (Math.random()*10-5), 5, 0, Math.PI*2);
                ctx.fill();
                b.timer--;
                if(b.timer <= 0) player.bullets.splice(i, 1);
            });

            requestAnimationFrame(draw);
        }

        window.addEventListener('mousedown', shoot);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        draw();
    </script>
</body>
</html>
